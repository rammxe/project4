<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <!-- 글로우 효과 -->
    <div class="movie-glow"></div>
    <div class="movie-glow"></div>
    <div class="movie-glow"></div>
    <header>
      <div class="logo">
        <a href="#">
          <img src="img/logo_remove.png" alt="로고" />
        </a>
      </div>
      <nav>
        <ul>
          <li>
            <a href="#">
              <i class="fa-solid fa-magnifying-glass"></i>
            </a>
          </li>
          <li>
            <a href="#">
              <i class="fa-regular fa-user"></i>
            </a>
          </li>
        </ul>
      </nav>
    </header>
    <div class="menu">
      <button type="button" onclick="movie('now_playing')">현재상영작</button>
      <button type="button" onclick="movie('popular')">무비차트</button>
      <button type="button" onclick="movie('top_rated')">추천영화</button>
      <button type="button" onclick="movie('upcoming')">상영예정</button>
    </div>
    <div class="search">
      <input id="searchInput" placeholder="영화제목을 입력하세요" />
      <button id="searchBtn">검색</button>
    </div>

    <section id="movieBoard"></section>
    <button id="movie">더보기</button>
    <script src="js/custom3.js"></script>
  </body>
</html>

<!-- 
url은 기본 주소
기본주소에 추가를 하는 것을 파라미터=값
처음에 파라미터를 추가할 때는 앞에 ?를 입력하고 
그 뒤부터는 &로 연결하여 정의함

예제 :: 기본주소?파라미터=값&파라미터=값

-->
